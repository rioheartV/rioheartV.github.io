<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Rush</title>
<style>
  :root { --accent:#6c8cff; --bg:#0f1117; --card:#1c2030; --border:#272c3d; --text:#e7e9ee; --muted:#9aa1b2; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:-apple-system,"Segoe UI","Noto Sans JP",sans-serif;
    background:var(--bg); color:var(--text);
    min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:24px;
  }
  a.back { align-self:flex-start; color:var(--muted); margin-bottom:16px; text-decoration:none; }
  a.back:hover { color:var(--text); }
  h1 { margin-bottom:6px; }
  .hud { color:var(--muted); margin-bottom:16px; display:flex; gap:24px; }
  .hud b { color:var(--accent); }
  #grid {
    display:grid; grid-template-columns:repeat(5,1fr); gap:10px;
    width:min(92vw,420px); aspect-ratio:1; margin-bottom:18px;
  }
  .cell {
    background:var(--card); border:1px solid var(--border); border-radius:10px;
    font-size:clamp(1rem,5vw,1.6rem); font-weight:700; color:var(--text);
    cursor:pointer; transition:transform .08s, background .15s;
  }
  .cell:hover { border-color:var(--accent); }
  .cell:active { transform:scale(.94); }
  .cell.done { background:rgba(108,140,255,.18); color:var(--muted); cursor:default; }
  .btn {
    padding:12px 28px; border:none; border-radius:999px; cursor:pointer;
    background:linear-gradient(135deg,#6c8cff,#a06cff); color:#fff; font-weight:700; font-size:1rem;
  }
  #msg { margin-top:14px; min-height:1.4em; color:var(--accent); font-weight:700; }
</style>
</head>
<body>
  <a class="back" href="../../index.html">← トップへ戻る</a>
  <h1>🔢 Number Rush</h1>
  <p class="hud">次: <b id="next">1</b>　時間: <b id="time">0.0</b>s　ベスト: <b id="best">--</b>s</p>
  <div id="grid"></div>
  <button class="btn" id="start">スタート</button>
  <p id="msg"></p>

<script>
  const N = 25;
  const grid = document.getElementById('grid');
  const nextEl = document.getElementById('next');
  const timeEl = document.getElementById('time');
  const bestEl = document.getElementById('best');
  const msg = document.getElementById('msg');
  let next, startTime, timer, playing = false;

  let best = localStorage.getItem('numberRushBest');
  if (best) bestEl.textContent = (+best).toFixed(2);

  function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

  function build(){
    grid.innerHTML='';
    const nums = shuffle([...Array(N)].map((_,i)=>i+1));
    nums.forEach(n=>{
      const c=document.createElement('button');
      c.className='cell'; c.textContent=n; c.dataset.n=n;
      c.onclick=()=>hit(c,n);
      grid.appendChild(c);
    });
  }

  function start(){
    build(); next=1; nextEl.textContent=1; playing=true; msg.textContent='';
    startTime=performance.now();
    clearInterval(timer);
    timer=setInterval(()=>{ timeEl.textContent=((performance.now()-startTime)/1000).toFixed(1); },50);
  }

  function hit(cell,n){
    if(!playing || n!==next) return;
    cell.classList.add('done');
    next++; nextEl.textContent=Math.min(next,N);
    if(next>N) finish();
  }

  function finish(){
    playing=false; clearInterval(timer);
    const t=(performance.now()-startTime)/1000;
    timeEl.textContent=t.toFixed(2);
    msg.textContent=`クリア！ ${t.toFixed(2)}秒 🎉`;
    if(!best || t<+best){ best=t; localStorage.setItem('numberRushBest',t); bestEl.textContent=t.toFixed(2); msg.textContent+=' ベスト更新！'; }
  }

  document.getElementById('start').onclick=start;
</script>
</body>
</html>
